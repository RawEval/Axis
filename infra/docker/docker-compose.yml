services:
  postgres:
    image: postgres:16-alpine
    container_name: axis-postgres
    environment:
      POSTGRES_USER: axis
      POSTGRES_PASSWORD: axis
      POSTGRES_DB: axis
    ports:
      - "5433:5432"
    volumes:
      - axis-postgres-data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: axis-redis
    ports:
      - "6379:6379"
    volumes:
      - axis-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: axis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - axis-qdrant-data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: axis-neo4j
    environment:
      NEO4J_AUTH: neo4j/axis-dev-password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - axis-neo4j-data:/data
      - axis-neo4j-logs:/logs

  mailhog:
    image: mailhog/mailhog:latest
    container_name: axis-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  axis-postgres-data:
  axis-redis-data:
  axis-qdrant-data:
  axis-neo4j-data:
  axis-neo4j-logs:
